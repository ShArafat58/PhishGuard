<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- PhishGuard icon: a shield (protection) with a check/hook motif. -->
  <defs>
    <linearGradient id="pg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="1" stop-color="#1e3a8a" />
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path
    d="M64 8 L112 26 V64 C112 96 90 116 64 122 C38 116 16 96 16 64 V26 Z"
    fill="url(#pg-grad)"
    stroke="#1e293b"
    stroke-width="3"
  />

  <!-- Inner highlight -->
  <path
    d="M64 20 L100 34 V64 C100 88 84 104 64 110 C44 104 28 88 28 64 V34 Z"
    fill="#ffffff"
    fill-opacity="0.10"
  />

  <!-- Check mark (safe / guarded) -->
  <path
    d="M46 66 L58 78 L84 48"
    fill="none"
    stroke="#ffffff"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>